services:
  cert-init:
    image: alpine:3.20
    command:
      - /bin/sh
      - -lc
      - |
        set -eu
        apk add --no-cache openssl
        mkdir -p /certs
        openssl genrsa -out /certs/ca.key 2048
        openssl req -x509 -new -nodes -key /certs/ca.key -sha256 -days 2 \
          -out /certs/ca.crt -subj "/CN=Hokusai Health Test CA"
        openssl genrsa -out /certs/server.key 2048
        cat >/tmp/server.cnf <<'EOF'
        [req]
        distinguished_name = req_distinguished_name
        req_extensions = req_ext
        prompt = no
        [req_distinguished_name]
        CN = mlflow
        [req_ext]
        subjectAltName = @alt_names
        extendedKeyUsage = serverAuth
        [alt_names]
        DNS.1 = mlflow
        DNS.2 = localhost
        IP.1 = 127.0.0.1
        EOF
        openssl req -new -key /certs/server.key -out /tmp/server.csr -config /tmp/server.cnf
        openssl x509 -req -in /tmp/server.csr -CA /certs/ca.crt -CAkey /certs/ca.key \
          -CAcreateserial -out /certs/server.crt -days 2 -sha256 \
          -extensions req_ext -extfile /tmp/server.cnf
        openssl genrsa -out /certs/client.key 2048
        cat >/tmp/client.cnf <<'EOF'
        [req]
        distinguished_name = req_distinguished_name
        prompt = no
        [req_distinguished_name]
        CN = api-client
        EOF
        openssl req -new -key /certs/client.key -out /tmp/client.csr -config /tmp/client.cnf
        openssl x509 -req -in /tmp/client.csr -CA /certs/ca.crt -CAkey /certs/ca.key \
          -CAcreateserial -out /certs/client.crt -days 2 -sha256
        chmod 644 /certs/ca.crt /certs/server.crt /certs/client.crt
        chmod 600 /certs/server.key /certs/client.key /certs/ca.key
    volumes:
      - mlflow_certs:/certs

  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres/init-health-test-databases.sh:/docker-entrypoint-initdb.d/init-health-test-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hokusai-network

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hokusai-network

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    environment:
      ENVIRONMENT: development
      MLFLOW_MTLS_ENABLED: "true"
      MLFLOW_CA_BUNDLE_PATH: /certs/ca.crt
      MLFLOW_SERVER_CERT_PATH: /certs/server.crt
      MLFLOW_SERVER_KEY_PATH: /certs/server.key
      BACKEND_STORE_URI: postgresql://postgres:password@postgres:5432/mlflow_db
      DEFAULT_ARTIFACT_ROOT: file:///mlflow/artifacts
    depends_on:
      cert-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - mlflow_certs:/certs:ro
      - mlflow_artifacts:/mlflow/artifacts
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent --show-error --cacert /certs/ca.crt --cert /certs/client.crt --key /certs/client.key 'https://localhost:5000/api/2.0/mlflow/registered-models/search?max_results=1' >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - hokusai-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      ENVIRONMENT: development
      API_SECRET_KEY: test-secret-key
      DB_PASSWORD: password
      POSTGRES_URI: postgresql://postgres:password@postgres:5432/hokusai_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MLFLOW_MTLS_ENABLED: "true"
      MLFLOW_SERVER_URL: https://mlflow:5000
      MLFLOW_TRACKING_URI: https://mlflow:5000
      MODEL_30_MLFLOW_URI: models:/Technical Task Router/latest
      MLFLOW_CA_BUNDLE_PATH: /certs/ca.crt
      MLFLOW_CLIENT_CERT_PATH: /certs/client.crt
      MLFLOW_CLIENT_KEY_PATH: /certs/client.key
    depends_on:
      cert-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - mlflow_certs:/certs:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent --show-error http://localhost:8001/api/health/mlflow >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s
    networks:
      - hokusai-network

  model-seed:
    build:
      context: .
      dockerfile: Dockerfile.api
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        python -c 'from src.utils.mlflow_config import configure_internal_mtls; configure_internal_mtls()'
        python scripts/model_30/seed_ci_mlflow_model.py
    environment:
      ENVIRONMENT: development
      MLFLOW_MTLS_ENABLED: "true"
      MLFLOW_TRACKING_URI: https://mlflow:5000
      MLFLOW_SERVER_URL: https://mlflow:5000
      MLFLOW_CA_BUNDLE_PATH: /certs/ca.crt
      MLFLOW_CLIENT_CERT_PATH: /certs/client.crt
      MLFLOW_CLIENT_KEY_PATH: /certs/client.key
      MODEL_30_MLFLOW_URI: models:/Technical Task Router/latest
    depends_on:
      cert-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    volumes:
      - mlflow_certs:/certs:ro
    networks:
      - hokusai-network

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.api
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        python -c 'from src.utils.mlflow_config import configure_internal_mtls; configure_internal_mtls()'
        pytest tests/integration/test_model_30_mlflow_serving.py -v --maxfail=1 --cov-fail-under=0
    environment:
      ENVIRONMENT: development
      API_SECRET_KEY: test-secret-key
      DB_PASSWORD: password
      MLFLOW_MTLS_ENABLED: "true"
      MLFLOW_SERVER_URL: https://mlflow:5000
      MLFLOW_TRACKING_URI: https://mlflow:5000
      MODEL_30_MLFLOW_URI: models:/Technical Task Router/latest
      MLFLOW_CA_BUNDLE_PATH: /certs/ca.crt
      MLFLOW_CLIENT_CERT_PATH: /certs/client.crt
      MLFLOW_CLIENT_KEY_PATH: /certs/client.key
    depends_on:
      cert-init:
        condition: service_completed_successfully
      api:
        condition: service_healthy
      model-seed:
        condition: service_completed_successfully
    volumes:
      - mlflow_certs:/certs:ro
    networks:
      - hokusai-network

volumes:
  postgres_data:
  mlflow_certs:
  mlflow_artifacts:

networks:
  hokusai-network:
    driver: bridge
